name: PR Validation Check

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Klonla (Checkout code)
        uses: actions/checkout@v4

      - name: Node.js Kurulumu (Setup Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Bağımlılıkları Yükle (Install Dependencies)
        run: npm ci

      - name: Veri Seti Validasyonu (Validate JSON Dataset)
        run: npx tsx scripts/validateCommands.ts

      - name: Next.js Proje Build Testi (Build Project)
        run: npm run build
